name: K-Merchant Report Processing

on:
  push:
    branches: [ main ] # Triggers on push to the main branch
  workflow_dispatch: # Allows manual triggering from the Actions tab
  schedule:
    # Two daily runs aligned to the ShopeePay email arrival pattern.
    # Note: GitHub Actions cron typically delays ~3-4h on hour boundaries due
    # to scheduler load, so the nominal UTC times below fire later in practice.
    #
    # Morning catch: ShopeePay normally sends the daily settlement email at
    # ~23:25 UTC (= 06:25 Thailand). This nominal-00:00-UTC cron fires around
    # 04:00 UTC = 11:00 Thailand in practice, so each day's email is ingested
    # ~4-5h after it arrives.
    - cron: '0 0 * * *'
    # Afternoon catch: holiday-delayed deliveries (observed 2026-05-01 at
    # 14:09 UTC = 21:09 Thailand) would otherwise wait for next morning's cron.
    # This nominal-15:00-UTC cron fires around 18:00-19:00 UTC = 01:00-02:00
    # Thailand, catching same-day late deliveries.
    - cron: '0 15 * * *'

permissions:
  contents: write

jobs:
  process_reports:
    runs-on: ubuntu-latest
    env:
      # These secrets need to be configured in your GitHub repository settings
      # Settings > Secrets and variables > Actions > New repository secret
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
      GMAIL_USER_EMAIL: ${{ secrets.GMAIL_USER_EMAIL }} # Email to impersonate
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      # This secret will hold the content of your service_account.json
      # The workflow will write it to a file.
      # GOOGLE_SERVICE_ACCOUNT_KEY_PATH will be the path to this created file.
      # By default, config.py expects 'service_account.json' in the project root.
      GOOGLE_SERVICE_ACCOUNT_KEY_PATH: service_account.json

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Specify your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Service Account JSON from Secret
      run: |
        cat <<EOF > ${{ env.GOOGLE_SERVICE_ACCOUNT_KEY_PATH }}
        ${{ secrets.GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_JSON }}
        EOF
      shell: bash

    - name: Run K-Merchant Report Processor
      run: python -m src.main

    - name: Keep workflow active (monthly)
      if: github.event_name == 'schedule'
      run: |
        # Only commit on the 1st of each month
        if [ $(date +%d) -eq 01 ]; then
          mkdir -p .github
          echo "Last automated run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/.workflow-keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.workflow-keepalive
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: keep workflow active [skip ci]" && git push)
        fi
      shell: bash